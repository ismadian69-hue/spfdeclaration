```html id="dns-vercel-pro-animations-full-001"
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>DNS Premium Dashboard</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter,Arial,sans-serif;
}

:root{
--bg:#0f172a;
--card:#111827;
--text:#ffffff;
--muted:#94a3b8;
--input:#020617;
--border:#1f2937;
}

body.light{
--bg:#f8fafc;
--card:#ffffff;
--text:#111827;
--muted:#64748b;
--input:#f8fafc;
--border:#e5e7eb;
}

body{
background:var(--bg);
color:var(--text);
min-height:100vh;
transition:.3s;
overflow-x:hidden;
animation:pageFade .7s ease;
}

/* LOGIN */
.login-page{
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

.login-box{
width:100%;
max-width:430px;
background:var(--card);
padding:35px;
border-radius:22px;
border:1px solid var(--border);
box-shadow:0 20px 45px rgba(0,0,0,.35);
animation:cardIn .7s ease;
}

.login-box h1{
font-size:30px;
text-align:center;
margin-bottom:8px;
}

.login-box p{
text-align:center;
color:var(--muted);
margin-bottom:22px;
}

.login-box label,
label{
display:block;
margin-top:14px;
margin-bottom:7px;
font-weight:700;
color:var(--muted);
}

.login-box input,
textarea{
width:100%;
padding:13px;
border-radius:14px;
border:1px solid var(--border);
background:var(--input);
color:var(--text);
outline:none;
transition:.22s;
}

textarea{
height:92px;
resize:vertical;
}

textarea:focus,
input:focus{
border-color:#3b82f6;
box-shadow:0 0 0 4px rgba(59,130,246,.15);
transform:scale(1.01);
}

button{
border:none;
border-radius:14px;
font-weight:800;
cursor:pointer;
color:#fff;
position:relative;
overflow:hidden;
transition:.18s;
}

button:hover{
transform:translateY(-2px);
}

button:active{
transform:scale(.97);
}

button::after{
content:"";
position:absolute;
top:0;
left:-120%;
width:100%;
height:100%;
background:linear-gradient(90deg,transparent,rgba(255,255,255,.22),transparent);
transition:.55s;
}

button:hover::after{
left:120%;
}

.login-btn,
button.action{
width:100%;
margin-top:18px;
padding:13px;
background:linear-gradient(135deg,#2563eb,#1d4ed8);
}

.error{
margin-top:14px;
color:#ef4444;
text-align:center;
display:none;
}

/* DASHBOARD */
#dashboard{
display:none;
}

.topbar{
padding:22px 30px;
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
gap:15px;
background:linear-gradient(135deg,#2563eb,#4f46e5);
color:#fff;
animation:slideTop .8s ease;
}

.top-actions{
display:flex;
gap:10px;
flex-wrap:wrap;
}

.top-actions button{
padding:10px 16px;
}

.theme{background:#0ea5e9;}
.logout{background:#ef4444;}

.wrapper{
padding:28px;
max-width:1500px;
margin:auto;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(340px,1fr));
gap:22px;
}

.card{
background:var(--card);
border:1px solid var(--border);
border-radius:22px;
padding:24px;
animation:cardIn .7s ease;
transition:transform .25s ease, box-shadow .25s ease;
}

.card:hover{
transform:translateY(-8px) scale(1.01);
box-shadow:0 20px 45px rgba(0,0,0,.22);
}

.card h2{
margin-bottom:16px;
font-size:24px;
}

.output,.history{
margin-top:25px;
background:var(--card);
border:1px solid var(--border);
border-radius:22px;
padding:24px;
animation:cardIn .8s ease;
}

#output{
height:220px;
}

.row{
display:flex;
gap:14px;
margin-top:16px;
flex-wrap:wrap;
}

.row button{
flex:1;
padding:12px;
}

.copy{background:#10b981;}
.clear{background:#ef4444;}

.history ul{
list-style:none;
margin-top:14px;
max-height:220px;
overflow:auto;
}

.history li{
padding:10px;
border-bottom:1px solid var(--border);
cursor:pointer;
font-size:14px;
transition:.2s;
}

.history li:hover{
transform:translateX(6px);
background:rgba(59,130,246,.08);
}

.toast{
position:fixed;
top:20px;
right:20px;
background:#10b981;
color:#fff;
padding:12px 18px;
border-radius:12px;
font-weight:800;
display:none;
z-index:999;
animation:toastPop .35s ease;
}

/* ANIMATIONS */
@keyframes pageFade{
from{opacity:0;}
to{opacity:1;}
}

@keyframes slideTop{
from{opacity:0;transform:translateY(-25px);}
to{opacity:1;transform:translateY(0);}
}

@keyframes cardIn{
from{opacity:0;transform:translateY(25px);}
to{opacity:1;transform:translateY(0);}
}

@keyframes toastPop{
from{opacity:0;transform:scale(.8);}
to{opacity:1;transform:scale(1);}
}

@media(max-width:768px){
.wrapper{padding:18px;}
}
</style>
</head>
<body>

<div class="toast" id="toast">Copied Successfully</div>

<!-- LOGIN -->
<div class="login-page" id="loginPage">
<div class="login-box">
<h1>🔒 Secure Access</h1>
<p>Please login to continue</p>

<label>Username</label>
<input type="text" id="username">

<label>Password</label>
<input type="password" id="password">

<button class="login-btn" onclick="login()">Login</button>

<div class="error" id="error">Invalid Username or Password</div>
</div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">

<div class="topbar">
<h1>DNS Premium Dashboard</h1>

<div class="top-actions">
<button class="theme" onclick="toggleTheme()">🌙 Theme</button>
<button class="logout" onclick="logout()">Logout</button>
</div>
</div>

<div class="wrapper">

<div class="grid">

<div class="card">
<h2>SPF Records</h2>
<label>Domains</label>
<textarea id="spfDomains"></textarea>
<label>Subdomains</label>
<textarea id="spfSubs"></textarea>
<label>IPs</label>
<textarea id="spfIps"></textarea>
<button class="action" onclick="generateSPF()">Generate SPF</button>
</div>

<div class="card">
<h2>MX Records</h2>
<label>Domains</label>
<textarea id="mxDomains"></textarea>
<label>Subdomains</label>
<textarea id="mxSubs"></textarea>
<label>IPs</label>
<textarea id="mxIps"></textarea>
<button class="action" onclick="generateMX()">Generate MX</button>
</div>

<div class="card">
<h2>A Records</h2>
<label>Domains</label>
<textarea id="aDomains"></textarea>
<label>Subdomains</label>
<textarea id="aSubs"></textarea>
<label>IPs</label>
<textarea id="aIps"></textarea>
<button class="action" onclick="generateA()">Generate A</button>
</div>

</div>

<div class="output">
<h2 style="margin-bottom:14px;">Output Console</h2>
<textarea id="output" readonly></textarea>

<div class="row">
<button class="copy" onclick="copyOutput()">Copy Output</button>
<button class="clear" onclick="clearAll()">Clear All</button>
</div>
</div>

<div class="history">
<h2>History</h2>
<ul id="historyList"></ul>
</div>

</div>
</div>

<script>
const USERNAME="admin";
const PASSWORD="123456";

/* force login */
dashboard.style.display="none";
loginPage.style.display="flex";

function login(){
let u=username.value.trim();
let p=password.value.trim();

if(u===USERNAME && p===PASSWORD){
loginPage.style.display="none";
dashboard.style.display="block";
renderHistory();

document.querySelectorAll(".card").forEach((card,i)=>{
card.style.animationDelay=(i*0.12)+"s";
});

}else{
error.style.display="block";
}
}

function logout(){
location.reload();
}

document.addEventListener("keydown",e=>{
if(e.key==="Enter" && loginPage.style.display!=="none"){
login();
}
});

/* theme */
if(localStorage.theme==="light"){
document.body.classList.add("light");
}

function toggleTheme(){
document.body.classList.toggle("light");
localStorage.theme=document.body.classList.contains("light")?"light":"dark";
}

/* helpers */
function lines(id){
return document.getElementById(id).value
.split('\n')
.map(x=>x.trim())
.filter(x=>x);
}

function setOutput(text){
output.value=text.trim();
saveHistory(text.trim());

output.animate([
{opacity:.4,transform:"scale(.99)"},
{opacity:1,transform:"scale(1)"}
],{
duration:260,
easing:"ease"
});
}

function showToast(msg="Copied Successfully"){
toast.innerText=msg;
toast.style.display="block";
setTimeout(()=>toast.style.display="none",1800);
}

/* history */
function saveHistory(result){
if(!result)return;

let history=JSON.parse(localStorage.getItem("dnsHistory")||"[]");

history.unshift({
date:new Date().toLocaleString(),
data:result
});

history=history.slice(0,20);

localStorage.setItem("dnsHistory",JSON.stringify(history));
renderHistory();
}

function renderHistory(){
historyList.innerHTML="";

let history=JSON.parse(localStorage.getItem("dnsHistory")||"[]");

history.forEach(item=>{
let li=document.createElement("li");
li.innerHTML=item.date;
li.onclick=()=>output.value=item.data;
historyList.appendChild(li);
});
}

/* generate */
function generateSPF(){
let domains=lines("spfDomains");
let subs=lines("spfSubs");
let ips=lines("spfIps");
let txt=ips.map(ip=>"ip4:"+ip).join(" ");
let out="";

domains.forEach(domain=>{
if(subs.length){
subs.forEach(sub=>{
out+=`${domain},${sub},TXT,"v=spf1 ${txt} -all"\n`;
});
}else{
out+=`${domain},${domain},TXT,"v=spf1 ${txt} -all"\n`;
}
});

setOutput(out);
}

function generateMX(){
let domains=lines("mxDomains");
let subs=lines("mxSubs");
let ips=lines("mxIps").join(";");
let out="";

domains.forEach(domain=>{
if(subs.length){
subs.forEach(sub=>{
out+=`${domain},${sub},TXT,MXrecords:${ips}\n`;
});
}else{
out+=`${domain},${domain},TXT,MXrecords:${ips}\n`;
}
});

setOutput(out);
}

function generateA(){
let domains=lines("aDomains");
let subs=lines("aSubs");
let ips=lines("aIps").join(";");
let out="";

domains.forEach(domain=>{
if(subs.length){
subs.forEach(sub=>{
out+=`${domain},${sub},TXT,Arecords:${ips}\n`;
});
}else{
out+=`${domain},${domain},TXT,Arecords:${ips}\n`;
}
});

setOutput(out);
}

function copyOutput(){
output.select();
document.execCommand("copy");
showToast();
}

function clearAll(){
document.querySelectorAll("textarea").forEach(t=>t.value="");
}
</script>

</body>
</html>
```
