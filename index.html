<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>DNS Premium Dashboard</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter,Arial,sans-serif;
}

body{
background:#0f172a;
color:#f8fafc;
}

.topbar{
background:linear-gradient(135deg,#020617,#111827);
padding:22px 30px;
color:#fff;
box-shadow:0 8px 25px rgba(0,0,0,.45);
}

.topbar h1{
font-size:32px;
font-weight:800;
}

.topbar p{
opacity:.9;
margin-top:5px;
color:#cbd5e1;
}

.wrapper{
padding:28px;
max-width:1500px;
margin:auto;
}

.stats{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:18px;
margin-bottom:22px;
}

.stat{
background:#111827;
padding:18px;
border-radius:18px;
box-shadow:0 12px 28px rgba(0,0,0,.35);
border:1px solid #1f2937;
}

.stat h3{
font-size:14px;
color:#94a3b8;
margin-bottom:10px;
}

.stat strong{
font-size:28px;
font-weight:800;
color:#f8fafc;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(340px,1fr));
gap:22px;
}

.card{
background:#111827;
border-radius:22px;
padding:24px;
box-shadow:0 12px 28px rgba(0,0,0,.35);
border:1px solid #1f2937;
transition:.25s;
}

.card:hover{
transform:translateY(-5px);
box-shadow:0 18px 35px rgba(0,0,0,.50);
}

.card h2{
font-size:24px;
margin-bottom:16px;
display:flex;
align-items:center;
gap:10px;
color:#f8fafc;
}

.icon{
width:42px;
height:42px;
border-radius:12px;
display:flex;
align-items:center;
justify-content:center;
font-size:18px;
color:#fff;
font-weight:bold;
}

.blue{background:#2563eb;}
.green{background:#10b981;}
.purple{background:#7c3aed;}

label{
display:block;
margin-top:14px;
margin-bottom:7px;
font-size:14px;
font-weight:700;
color:#94a3b8;
}

textarea{
width:100%;
height:92px;
padding:12px;
border:1px solid #334155;
border-radius:14px;
resize:vertical;
outline:none;
background:#0f172a;
color:#f8fafc;
font-size:14px;
transition:.2s;
}

textarea:focus{
background:#020617;
border-color:#3b82f6;
box-shadow:0 0 0 4px rgba(59,130,246,.18);
}

button{
margin-top:16px;
width:100%;
padding:12px;
border:none;
border-radius:14px;
cursor:pointer;
font-weight:800;
font-size:15px;
color:#fff;
transition:.2s;
}

.btn-blue{background:linear-gradient(135deg,#2563eb,#1d4ed8);}
.btn-green{background:linear-gradient(135deg,#10b981,#059669);}
.btn-purple{background:linear-gradient(135deg,#7c3aed,#6d28d9);}

button:hover{
transform:translateY(-2px);
}

.output{
margin-top:25px;
background:#111827;
border-radius:22px;
padding:24px;
box-shadow:0 12px 28px rgba(0,0,0,.35);
border:1px solid #1f2937;
}

#output{
height:230px;
background:#020617;
color:#22c55e;
}

.actions{
display:flex;
gap:14px;
margin-top:16px;
flex-wrap:wrap;
}

.actions button{
flex:1;
}

.copy{
background:linear-gradient(135deg,#0ea5e9,#2563eb);
}

.clear{
background:linear-gradient(135deg,#ef4444,#dc2626);
}

.toast{
position:fixed;
top:20px;
right:20px;
background:#10b981;
color:#fff;
padding:12px 18px;
border-radius:12px;
font-weight:800;
display:none;
box-shadow:0 10px 20px rgba(0,0,0,.35);
z-index:999;
}

@media(max-width:768px){
.wrapper{padding:18px;}
.topbar h1{font-size:26px;}
}
</style>
</head>
<body>

<div class="toast" id="toast">Copied Successfully</div>

<div class="topbar">
<h1> IB DNS Premium Dashboard</h1>
<p>Generate SPF, MX and A TXT records instantly</p>
</div>

<div class="wrapper">

<div class="stats">
<div class="stat"><h3>Records Types</h3><strong>3</strong></div>
<div class="stat"><h3>Export Ready</h3><strong>TXT</strong></div>
<div class="stat"><h3>Status</h3><strong>Online</strong></div>
<div class="stat"><h3>Speed</h3><strong>Fast</strong></div>
</div>

<div class="grid">

<div class="card">
<h2><span class="icon blue">S</span> SPF Records</h2>
<label>Domains</label>
<textarea id="spfDomains"></textarea>
<label>Subdomains</label>
<textarea id="spfSubs"></textarea>
<label>IPs</label>
<textarea id="spfIps"></textarea>
<button class="btn-blue" onclick="generateSPF()">Generate SPF</button>
</div>

<div class="card">
<h2><span class="icon green">M</span> MX Records</h2>
<label>Domains</label>
<textarea id="mxDomains"></textarea>
<label>Subdomains</label>
<textarea id="mxSubs"></textarea>
<label>IPs</label>
<textarea id="mxIps"></textarea>
<button class="btn-green" onclick="generateMX()">Generate MX</button>
</div>

<div class="card">
<h2><span class="icon purple">A</span> A Records</h2>
<label>Domains</label>
<textarea id="aDomains"></textarea>
<label>Subdomains</label>
<textarea id="aSubs"></textarea>
<label>IPs</label>
<textarea id="aIps"></textarea>
<button class="btn-purple" onclick="generateA()">Generate A Records</button>
</div>

</div>

<div class="output">
<h2 style="margin-bottom:14px;color:#fff;">Output Console</h2>
<textarea id="output" readonly></textarea>

<div class="actions">
<button class="copy" onclick="copyOutput()">Copy Output</button>
<button class="clear" onclick="clearAll()">Clear All</button>
</div>
</div>

</div>

<script>
function lines(id){
return document.getElementById(id).value
.split('\n')
.map(x=>x.trim())
.filter(x=>x);
}

function setOutput(text){
document.getElementById("output").value=text.trim();
}

function generateSPF(){
let domains=lines("spfDomains");
let subs=lines("spfSubs");
let ips=lines("spfIps");
let txt=ips.map(ip=>"ip4:"+ip).join(" ");
let out="";

domains.forEach(domain=>{
if(subs.length){
subs.forEach(sub=>{
out+=`${domain},${sub},TXT,"v=spf1 ${txt} -all"\n`;
});
}else{
out+=`${domain},${domain},TXT,"v=spf1 ${txt} -all"\n`;
}
});

setOutput(out);
}

function generateMX(){
let domains=lines("mxDomains");
let subs=lines("mxSubs");
let ips=lines("mxIps").join(";");
let out="";

domains.forEach(domain=>{
if(subs.length){
subs.forEach(sub=>{
out+=`${domain},${sub},TXT,MXrecords:${ips}\n`;
});
}else{
out+=`${domain},${domain},TXT,MXrecords:${ips}\n`;
}
});

setOutput(out);
}

function generateA(){
let domains=lines("aDomains");
let subs=lines("aSubs");
let ips=lines("aIps").join(";");
let out="";

domains.forEach(domain=>{
if(subs.length){
subs.forEach(sub=>{
out+=`${domain},${sub},TXT,Arecords:${ips}\n`;
});
}else{
out+=`${domain},${domain},TXT,Arecords:${ips}\n`;
}
});

setOutput(out);
}

function copyOutput(){
let out=document.getElementById("output");
out.select();
document.execCommand("copy");

let t=document.getElementById("toast");
t.style.display="block";
setTimeout(()=>t.style.display="none",1800);
}

function clearAll(){
document.querySelectorAll("textarea").forEach(t=>t.value="");
}
</script>

</body>
</html>
