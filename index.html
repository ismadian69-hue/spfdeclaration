<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>DNS Requests</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:#f3f4f6;
padding:25px;
color:#111827;
}

h1{
text-align:center;
margin-bottom:28px;
font-size:34px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(340px,1fr));
gap:24px;
}

.card{
background:#fff;
padding:22px;
border-radius:14px;
box-shadow:0 8px 22px rgba(0,0,0,.08);
border:1px solid #e5e7eb;
}

.card h2{
text-align:center;
margin-bottom:20px;
font-size:30px;
}

label{
display:block;
margin-top:14px;
margin-bottom:7px;
font-weight:700;
font-size:15px;
}

textarea{
width:100%;
height:95px;
padding:10px;
border:1px solid #d1d5db;
border-radius:8px;
resize:vertical;
outline:none;
font-size:14px;
}

textarea:focus{
border-color:#2563eb;
box-shadow:0 0 0 3px rgba(37,99,235,.15);
}

button{
margin-top:16px;
padding:11px 18px;
border:none;
border-radius:8px;
cursor:pointer;
font-size:15px;
font-weight:700;
transition:.2s;
}

.green{
background:#22c55e;
color:#fff;
}

.green:hover{
background:#16a34a;
}

.blue{
background:#2563eb;
color:#fff;
}

.blue:hover{
background:#1d4ed8;
}

.red{
background:#ef4444;
color:#fff;
}

.red:hover{
background:#dc2626;
}

.outputBox{
margin-top:28px;
background:#fff;
padding:22px;
border-radius:14px;
box-shadow:0 8px 22px rgba(0,0,0,.08);
border:1px solid #e5e7eb;
}

#output{
height:220px;
}

.actions{
display:flex;
gap:14px;
margin-top:16px;
flex-wrap:wrap;
}

.toast{
position:fixed;
top:20px;
right:20px;
background:#22c55e;
color:#fff;
padding:12px 18px;
border-radius:8px;
display:none;
font-weight:bold;
}

@media(max-width:768px){
h1{font-size:28px;}
.card h2{font-size:24px;}
}
</style>
</head>
<body>

<div class="toast" id="toast">Copied Successfully</div>

<h1>DNS Requests</h1>

<div class="grid">

<!-- SPF -->
<div class="card">
<h2>SPF Records</h2>

<label>SPF Domains (each on a new line):</label>
<textarea id="spfDomains"></textarea>

<label>SPF Subdomains (each on a new line):</label>
<textarea id="spfSubs"></textarea>

<label>SPF IPs (each on a new line):</label>
<textarea id="spfIps"></textarea>

<button class="green" onclick="generateSPF()">Generate SPF</button>
</div>

<!-- MX -->
<div class="card">
<h2>MX Records</h2>

<label>MX Domains (each on a new line):</label>
<textarea id="mxDomains"></textarea>

<label>MX Subdomains (each on a new line):</label>
<textarea id="mxSubs"></textarea>

<label>MX IPs (each on a new line):</label>
<textarea id="mxIps"></textarea>

<button class="green" onclick="generateMX()">Generate MX</button>
</div>

<!-- A -->
<div class="card">
<h2>A Records</h2>

<label>Domains (each on a new line):</label>
<textarea id="aDomains"></textarea>

<label>Subdomains (each on a new line):</label>
<textarea id="aSubs"></textarea>

<label>A Records IPs (each on a new line):</label>
<textarea id="aIps"></textarea>

<button class="green" onclick="generateA()">Generate A Records</button>
</div>

</div>

<div class="outputBox">
<h2 style="margin-bottom:14px;">Output</h2>

<textarea id="output" readonly></textarea>

<div class="actions">
<button class="blue" onclick="copyOutput()">Copy Output</button>
<button class="red" onclick="clearAll()">Clear All</button>
</div>
</div>

<script>

function lines(id){
return document.getElementById(id).value
.split('\n')
.map(x=>x.trim())
.filter(x=>x);
}

function setOutput(text){
document.getElementById("output").value=text.trim();
}

/* SPF */
function generateSPF(){

let domains=lines("spfDomains");
let subs=lines("spfSubs");
let ips=lines("spfIps");

let all=[...domains,...subs];

let iptxt=ips.map(ip=>"ip4:"+ip).join(" ");

let out="";

all.forEach(d=>{
out+=`${d},${d},TXT,"v=spf1 ${iptxt} -all"\n`;
});

setOutput(out);
}

/* MX */
function generateMX(){

let domains=lines("mxDomains");
let subs=lines("mxSubs");
let ips=lines("mxIps");

let all=[...domains,...subs];

let list=ips.join(";");

let out="";

all.forEach(d=>{
out+=`${d},${d},TXT,MXrecords:${list}\n`;
});

setOutput(out);
}

/* A */
function generateA(){

let domains=lines("aDomains");
let subs=lines("aSubs");
let ips=lines("aIps");

let all=[...domains,...subs];

let list=ips.join(";");

let out="";

all.forEach(d=>{
out+=`${d},${d},TXT,Arecords:${list}\n`;
});

setOutput(out);
}

/* Copy */
function copyOutput(){
let out=document.getElementById("output");
out.select();
document.execCommand("copy");
showToast();
}

/* Clear */
function clearAll(){
document.querySelectorAll("textarea").forEach(t=>t.value="");
}

/* Toast */
function showToast(){
let t=document.getElementById("toast");
t.style.display="block";
setTimeout(()=>t.style.display="none",1800);
}

</script>

</body>
</html>
```
