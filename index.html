<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Secure DNS Dashboard</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter,Arial,sans-serif;
}

body{
background:#0f172a;
color:#fff;
min-height:100vh;
}

/* LOGIN */
.login-page{
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

.login-box{
width:100%;
max-width:420px;
background:#111827;
padding:35px;
border-radius:22px;
border:1px solid #1f2937;
box-shadow:0 20px 40px rgba(0,0,0,.45);
}

.login-box h1{
font-size:30px;
margin-bottom:8px;
text-align:center;
}

.login-box p{
text-align:center;
color:#94a3b8;
margin-bottom:25px;
}

.login-box label{
display:block;
margin-top:14px;
margin-bottom:8px;
font-weight:700;
color:#cbd5e1;
}

.login-box input{
width:100%;
padding:13px;
border-radius:14px;
border:1px solid #334155;
background:#0f172a;
color:#fff;
outline:none;
font-size:15px;
}

.login-box input:focus{
border-color:#3b82f6;
box-shadow:0 0 0 4px rgba(59,130,246,.15);
}

.login-btn{
width:100%;
margin-top:18px;
padding:13px;
border:none;
border-radius:14px;
background:linear-gradient(135deg,#2563eb,#1d4ed8);
color:#fff;
font-weight:800;
font-size:15px;
cursor:pointer;
}

.login-btn:hover{
transform:translateY(-2px);
}

.error{
margin-top:14px;
color:#ef4444;
font-size:14px;
display:none;
text-align:center;
}

/* DASHBOARD */
#dashboard{
display:none;
}

.topbar{
background:linear-gradient(135deg,#020617,#111827);
padding:22px 30px;
display:flex;
justify-content:space-between;
align-items:center;
gap:15px;
flex-wrap:wrap;
}

.topbar h1{
font-size:30px;
}

.logout{
padding:10px 18px;
border:none;
border-radius:12px;
background:#ef4444;
color:#fff;
font-weight:800;
cursor:pointer;
}

.wrapper{
padding:28px;
max-width:1500px;
margin:auto;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(340px,1fr));
gap:22px;
}

.card{
background:#111827;
border-radius:22px;
padding:24px;
border:1px solid #1f2937;
box-shadow:0 12px 28px rgba(0,0,0,.35);
}

.card h2{
margin-bottom:16px;
font-size:24px;
}

label{
display:block;
margin-top:14px;
margin-bottom:7px;
color:#94a3b8;
font-weight:700;
}

textarea{
width:100%;
height:92px;
padding:12px;
border:1px solid #334155;
border-radius:14px;
resize:vertical;
outline:none;
background:#0f172a;
color:#fff;
}

textarea:focus{
border-color:#3b82f6;
box-shadow:0 0 0 4px rgba(59,130,246,.15);
}

button.action{
width:100%;
margin-top:16px;
padding:12px;
border:none;
border-radius:14px;
font-weight:800;
color:#fff;
cursor:pointer;
background:linear-gradient(135deg,#2563eb,#1d4ed8);
}

.output{
margin-top:24px;
background:#111827;
padding:24px;
border-radius:22px;
border:1px solid #1f2937;
}

#output{
height:220px;
background:#020617;
color:#22c55e;
}

.row{
display:flex;
gap:14px;
margin-top:16px;
flex-wrap:wrap;
}

.row button{
flex:1;
padding:12px;
border:none;
border-radius:14px;
font-weight:800;
cursor:pointer;
color:#fff;
}

.copy{background:#0ea5e9;}
.clear{background:#ef4444;}

.toast{
position:fixed;
top:20px;
right:20px;
background:#10b981;
padding:12px 18px;
border-radius:12px;
display:none;
font-weight:800;
}

@media(max-width:768px){
.topbar h1{font-size:24px;}
.wrapper{padding:18px;}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-page" id="loginPage">
<div class="login-box">
<h1>🔒 Secure Access</h1>
<p>Please login to continue</p>

<label>Username</label>
<input type="text" id="username">

<label>Password</label>
<input type="password" id="password">

<button class="login-btn" onclick="login()">Login</button>

<div class="error" id="error">Invalid Username or Password</div>
</div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">

<div class="topbar">
<h1>DNS Premium Dashboard</h1>
<button class="logout" onclick="logout()">Logout</button>
</div>

<div class="wrapper">

<div class="grid">

<div class="card">
<h2>SPF Records</h2>
<label>Domains</label>
<textarea id="spfDomains"></textarea>
<label>Subdomains</label>
<textarea id="spfSubs"></textarea>
<label>IPs</label>
<textarea id="spfIps"></textarea>
<button class="action" onclick="generateSPF()">Generate SPF</button>
</div>

<div class="card">
<h2>MX Records</h2>
<label>Domains</label>
<textarea id="mxDomains"></textarea>
<label>Subdomains</label>
<textarea id="mxSubs"></textarea>
<label>IPs</label>
<textarea id="mxIps"></textarea>
<button class="action" onclick="generateMX()">Generate MX</button>
</div>

<div class="card">
<h2>A Records</h2>
<label>Domains</label>
<textarea id="aDomains"></textarea>
<label>Subdomains</label>
<textarea id="aSubs"></textarea>
<label>IPs</label>
<textarea id="aIps"></textarea>
<button class="action" onclick="generateA()">Generate A</button>
</div>

</div>

<div class="output">
<h2 style="margin-bottom:14px;">Output Console</h2>
<textarea id="output" readonly></textarea>

<div class="row">
<button class="copy" onclick="copyOutput()">Copy Output</button>
<button class="clear" onclick="clearAll()">Clear All</button>
</div>
</div>

</div>
</div>

<div class="toast" id="toast">Copied Successfully</div>

<script>

/* CHANGE LOGIN HERE */
const USERNAME = "admin";
const PASSWORD = "123456";

/* LOGIN */
function login(){
let u=document.getElementById("username").value.trim();
let p=document.getElementById("password").value.trim();

if(u===USERNAME && p===PASSWORD){
document.getElementById("loginPage").style.display="none";
document.getElementById("dashboard").style.display="block";
sessionStorage.setItem("logged","yes");
}else{
document.getElementById("error").style.display="block";
}
}

function logout(){
sessionStorage.removeItem("logged");
location.reload();
}

if(sessionStorage.getItem("logged")==="yes"){
document.getElementById("loginPage").style.display="none";
document.getElementById("dashboard").style.display="block";
}

/* HELPERS */
function lines(id){
return document.getElementById(id).value
.split('\n')
.map(x=>x.trim())
.filter(x=>x);
}

function setOutput(text){
document.getElementById("output").value=text.trim();
}

/* SPF */
function generateSPF(){
let domains=lines("spfDomains");
let subs=lines("spfSubs");
let ips=lines("spfIps");
let txt=ips.map(ip=>"ip4:"+ip).join(" ");
let out="";

domains.forEach(domain=>{
if(subs.length){
subs.forEach(sub=>{
out+=`${domain},${sub},TXT,"v=spf1 ${txt} -all"\n`;
});
}else{
out+=`${domain},${domain},TXT,"v=spf1 ${txt} -all"\n`;
}
});

setOutput(out);
}

/* MX */
function generateMX(){
let domains=lines("mxDomains");
let subs=lines("mxSubs");
let ips=lines("mxIps").join(";");
let out="";

domains.forEach(domain=>{
if(subs.length){
subs.forEach(sub=>{
out+=`${domain},${sub},TXT,MXrecords:${ips}\n`;
});
}else{
out+=`${domain},${domain},TXT,MXrecords:${ips}\n`;
}
});

setOutput(out);
}

/* A */
function generateA(){
let domains=lines("aDomains");
let subs=lines("aSubs");
let ips=lines("aIps").join(";");
let out="";

domains.forEach(domain=>{
if(subs.length){
subs.forEach(sub=>{
out+=`${domain},${sub},TXT,Arecords:${ips}\n`;
});
}else{
out+=`${domain},${domain},TXT,Arecords:${ips}\n`;
}
});

setOutput(out);
}

/* COPY */
function copyOutput(){
let out=document.getElementById("output");
out.select();
document.execCommand("copy");

let t=document.getElementById("toast");
t.style.display="block";
setTimeout(()=>t.style.display="none",1800);
}

/* CLEAR */
function clearAll(){
document.querySelectorAll("textarea").forEach(t=>t.value="");
}

document.addEventListener("keydown",function(e){
if(e.key==="Enter" && document.getElementById("loginPage").style.display!=="none"){
login();
}
});

</script>

</body>
</html>
