<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>DNS Premium Dashboard</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter,Arial,sans-serif;
}

:root{
--bg:#0f172a;
--card:#111827;
--text:#ffffff;
--muted:#94a3b8;
--input:#020617;
--border:#1f2937;
}

body.light{
--bg:#f8fafc;
--card:#ffffff;
--text:#111827;
--muted:#64748b;
--input:#f8fafc;
--border:#e5e7eb;
}

body{
background:var(--bg);
color:var(--text);
transition:.3s;
min-height:100vh;
}

.topbar{
padding:22px 30px;
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
gap:15px;
background:linear-gradient(135deg,#2563eb,#4f46e5);
color:#fff;
}

.topbar h1{
font-size:28px;
}

.top-actions{
display:flex;
gap:10px;
flex-wrap:wrap;
}

.top-actions button{
padding:10px 16px;
border:none;
border-radius:12px;
cursor:pointer;
font-weight:800;
color:#fff;
}

.theme{background:#0ea5e9;}
.logout{background:#ef4444;}

.wrapper{
padding:28px;
max-width:1500px;
margin:auto;
animation:fade .6s ease;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(340px,1fr));
gap:22px;
}

.card{
background:var(--card);
border:1px solid var(--border);
border-radius:22px;
padding:24px;
box-shadow:0 12px 28px rgba(0,0,0,.15);
transition:.25s;
animation:up .5s ease;
}

.card:hover{
transform:translateY(-5px);
}

.card h2{
margin-bottom:16px;
font-size:24px;
}

label{
display:block;
margin-top:14px;
margin-bottom:7px;
font-weight:700;
color:var(--muted);
}

textarea{
width:100%;
height:92px;
padding:12px;
border-radius:14px;
border:1px solid var(--border);
background:var(--input);
color:var(--text);
resize:vertical;
outline:none;
}

button.action{
width:100%;
margin-top:16px;
padding:12px;
border:none;
border-radius:14px;
font-weight:800;
cursor:pointer;
color:#fff;
background:linear-gradient(135deg,#2563eb,#1d4ed8);
transition:.2s;
}

button.action:hover{
transform:scale(1.02);
}

.output{
margin-top:25px;
background:var(--card);
border:1px solid var(--border);
border-radius:22px;
padding:24px;
animation:up .6s ease;
}

#output{
height:220px;
}

.row{
display:flex;
gap:14px;
margin-top:16px;
flex-wrap:wrap;
}

.row button{
flex:1;
padding:12px;
border:none;
border-radius:14px;
font-weight:800;
cursor:pointer;
color:#fff;
}

.copy{background:#10b981;}
.clear{background:#ef4444;}

.history{
margin-top:25px;
background:var(--card);
border:1px solid var(--border);
border-radius:22px;
padding:24px;
}

.history ul{
margin-top:14px;
list-style:none;
max-height:220px;
overflow:auto;
}

.history li{
padding:10px;
border-bottom:1px solid var(--border);
font-size:14px;
cursor:pointer;
transition:.2s;
}

.history li:hover{
background:rgba(59,130,246,.08);
}

.toast{
position:fixed;
top:20px;
right:20px;
background:#10b981;
padding:12px 18px;
border-radius:12px;
font-weight:800;
display:none;
color:#fff;
z-index:999;
animation:fade .3s;
}

@keyframes fade{
from{opacity:0;}
to{opacity:1;}
}

@keyframes up{
from{opacity:0;transform:translateY(15px);}
to{opacity:1;transform:translateY(0);}
}

@media(max-width:768px){
.wrapper{padding:18px;}
.topbar h1{font-size:22px;}
}
</style>
</head>
<body>

<div class="toast" id="toast">Copied Successfully</div>

<div class="topbar">
<h1>DNS Premium Dashboard</h1>

<div class="top-actions">
<button class="theme" onclick="toggleTheme()">🌙 Theme</button>
<button class="logout" onclick="logout()">Logout</button>
</div>
</div>

<div class="wrapper">

<div class="grid">

<div class="card">
<h2>SPF Records</h2>
<label>Domains</label>
<textarea id="spfDomains"></textarea>
<label>Subdomains</label>
<textarea id="spfSubs"></textarea>
<label>IPs</label>
<textarea id="spfIps"></textarea>
<button class="action" onclick="generateSPF()">Generate SPF</button>
</div>

<div class="card">
<h2>MX Records</h2>
<label>Domains</label>
<textarea id="mxDomains"></textarea>
<label>Subdomains</label>
<textarea id="mxSubs"></textarea>
<label>IPs</label>
<textarea id="mxIps"></textarea>
<button class="action" onclick="generateMX()">Generate MX</button>
</div>

<div class="card">
<h2>A Records</h2>
<label>Domains</label>
<textarea id="aDomains"></textarea>
<label>Subdomains</label>
<textarea id="aSubs"></textarea>
<label>IPs</label>
<textarea id="aIps"></textarea>
<button class="action" onclick="generateA()">Generate A</button>
</div>

</div>

<div class="output">
<h2 style="margin-bottom:14px;">Output Console</h2>
<textarea id="output" readonly></textarea>

<div class="row">
<button class="copy" onclick="copyOutput()">Copy Output</button>
<button class="clear" onclick="clearAll()">Clear All</button>
</div>
</div>

<div class="history">
<h2>History</h2>
<ul id="historyList"></ul>
</div>

</div>

<script>

/* THEME */
if(localStorage.theme==="light"){
document.body.classList.add("light");
}

function toggleTheme(){
document.body.classList.toggle("light");
localStorage.theme=document.body.classList.contains("light") ? "light":"dark";
}

/* HELPERS */
function lines(id){
return document.getElementById(id).value
.split('\n')
.map(x=>x.trim())
.filter(x=>x);
}

function setOutput(text){
document.getElementById("output").value=text.trim();
saveHistory(text.trim());
}

function showToast(msg="Copied Successfully"){
let t=document.getElementById("toast");
t.innerText=msg;
t.style.display="block";
setTimeout(()=>t.style.display="none",1800);
}

/* HISTORY */
function saveHistory(result){
if(!result) return;

let history=JSON.parse(localStorage.getItem("dnsHistory")||"[]");

history.unshift({
date:new Date().toLocaleString(),
data:result
});

history=history.slice(0,20);

localStorage.setItem("dnsHistory",JSON.stringify(history));

renderHistory();
}

function renderHistory(){
let list=document.getElementById("historyList");
let history=JSON.parse(localStorage.getItem("dnsHistory")||"[]");

list.innerHTML="";

history.forEach((item,i)=>{
let li=document.createElement("li");
li.innerHTML=`${item.date}`;
li.onclick=()=>{
document.getElementById("output").value=item.data;
};
list.appendChild(li);
});
}

renderHistory();

/* SPF */
function generateSPF(){
let domains=lines("spfDomains");
let subs=lines("spfSubs");
let ips=lines("spfIps");
let txt=ips.map(ip=>"ip4:"+ip).join(" ");
let out="";

domains.forEach(domain=>{
if(subs.length){
subs.forEach(sub=>{
out+=`${domain},${sub},TXT,"v=spf1 ${txt} -all"\n`;
});
}else{
out+=`${domain},${domain},TXT,"v=spf1 ${txt} -all"\n`;
}
});

setOutput(out);
}

/* MX */
function generateMX(){
let domains=lines("mxDomains");
let subs=lines("mxSubs");
let ips=lines("mxIps").join(";");
let out="";

domains.forEach(domain=>{
if(subs.length){
subs.forEach(sub=>{
out+=`${domain},${sub},TXT,MXrecords:${ips}\n`;
});
}else{
out+=`${domain},${domain},TXT,MXrecords:${ips}\n`;
}
});

setOutput(out);
}

/* A */
function generateA(){
let domains=lines("aDomains");
let subs=lines("aSubs");
let ips=lines("aIps").join(";");
let out="";

domains.forEach(domain=>{
if(subs.length){
subs.forEach(sub=>{
out+=`${domain},${sub},TXT,Arecords:${ips}\n`;
});
}else{
out+=`${domain},${domain},TXT,Arecords:${ips}\n`;
}
});

setOutput(out);
}

/* COPY */
function copyOutput(){
let out=document.getElementById("output");
out.select();
document.execCommand("copy");
showToast();
}

/* CLEAR */
function clearAll(){
document.querySelectorAll("textarea").forEach(t=>t.value="");
}

/* LOGOUT */
function logout(){
location.reload();
}

</script>

</body>
</html>
