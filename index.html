<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>DNS SaaS Dashboard</title>

<style>
:root{
--bg:#f5f7ff;
--card:#ffffff;
--text:#111827;
--muted:#6b7280;
--border:#e5e7eb;
--primary:#2563eb;
--primary2:#4f46e5;
--shadow:0 10px 30px rgba(0,0,0,.08);
}

body.dark{
--bg:#0b1220;
--card:#111827;
--text:#f9fafb;
--muted:#9ca3af;
--border:#1f2937;
--primary:#3b82f6;
--primary2:#6366f1;
--shadow:0 10px 30px rgba(0,0,0,.35);
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter,Arial,sans-serif;
}

body{
background:var(--bg);
color:var(--text);
transition:.3s;
}

.topbar{
max-width:1400px;
margin:auto;
padding:25px 20px;
display:flex;
justify-content:space-between;
align-items:center;
gap:15px;
flex-wrap:wrap;
}

.title h1{
font-size:32px;
margin-bottom:6px;
}

.title p{
color:var(--muted);
}

.toggle{
background:linear-gradient(135deg,var(--primary),var(--primary2));
color:#fff;
border:none;
padding:10px 16px;
border-radius:12px;
cursor:pointer;
font-weight:700;
box-shadow:var(--shadow);
}

.container{
max-width:1400px;
margin:auto;
padding:0 20px 30px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
gap:20px;
}

.card{
background:var(--card);
border:1px solid var(--border);
border-radius:18px;
padding:22px;
box-shadow:var(--shadow);
}

.card h2{
font-size:20px;
margin-bottom:18px;
}

label{
display:block;
margin-top:14px;
margin-bottom:8px;
font-size:14px;
color:var(--muted);
font-weight:600;
}

textarea{
width:100%;
min-height:95px;
resize:vertical;
padding:12px;
border:1px solid var(--border);
border-radius:14px;
background:transparent;
color:var(--text);
outline:none;
}

textarea:focus{
border-color:var(--primary);
box-shadow:0 0 0 4px rgba(37,99,235,.12);
}

.btn{
margin-top:16px;
border:none;
padding:12px 16px;
border-radius:14px;
cursor:pointer;
font-weight:700;
width:100%;
background:linear-gradient(135deg,var(--primary),var(--primary2));
color:#fff;
}

.btn:hover{
transform:translateY(-1px);
}

.output{
margin-top:22px;
}

.actions{
display:flex;
gap:12px;
margin-top:14px;
flex-wrap:wrap;
}

.actions button{
flex:1;
min-width:140px;
}

.secondary{
background:#10b981;
color:#fff;
}

.danger{
background:#ef4444;
color:#fff;
}

.toast{
position:fixed;
top:20px;
right:20px;
background:#10b981;
color:#fff;
padding:12px 18px;
border-radius:12px;
display:none;
box-shadow:var(--shadow);
z-index:999;
font-weight:700;
}

@media(max-width:768px){
.title h1{font-size:26px;}
}
</style>
</head>
<body>

<div class="toast" id="toast">Copied Successfully</div>

<div class="topbar">
<div class="title">
<h1>DNS SaaS Dashboard</h1>
<p>Generate SPF, MX and A TXT records instantly</p>
</div>

<button class="toggle" onclick="toggleTheme()">🌙 Dark Mode</button>
</div>

<div class="container">

<div class="grid">

<div class="card">
<h2>SPF Records</h2>

<label>Domains</label>
<textarea id="spfDomains"></textarea>

<label>IPs</label>
<textarea id="spfIps"></textarea>

<button class="btn" onclick="generateSPF()">Generate SPF</button>
</div>

<div class="card">
<h2>MX Records</h2>

<label>Domains</label>
<textarea id="mxDomains"></textarea>

<label>IPs</label>
<textarea id="mxIps"></textarea>

<button class="btn" onclick="generateMX()">Generate MX</button>
</div>

<div class="card">
<h2>A Records</h2>

<label>Domains</label>
<textarea id="aDomains"></textarea>

<label>IPs</label>
<textarea id="aIps"></textarea>

<button class="btn" onclick="generateA()">Generate A</button>
</div>

</div>

<div class="card output">
<h2>Output</h2>

<textarea id="output" readonly style="min-height:220px;"></textarea>

<div class="actions">
<button class="btn secondary" onclick="copyOutput()">Copy Output</button>
<button class="btn danger" onclick="clearAll()">Clear All</button>
</div>

</div>

</div>

<script>

function lines(id){
return document.getElementById(id).value
.split('\n')
.map(x=>x.trim())
.filter(x=>x);
}

function setOutput(text){
document.getElementById("output").value=text.trim();
}

function generateSPF(){
let domains=lines("spfDomains");
let ips=lines("spfIps");
let iptxt=ips.map(ip=>"ip4:"+ip).join(" ");
let out="";
domains.forEach(d=>{
out+=`${d},${d},TXT,"v=spf1 ${iptxt} -all"\n`;
});
setOutput(out);
}

function generateMX(){
let domains=lines("mxDomains");
let ips=lines("mxIps");
let list=ips.join(";");
let out="";
domains.forEach(d=>{
out+=`${d},${d},TXT,MXrecords:${list}\n`;
});
setOutput(out);
}

function generateA(){
let domains=lines("aDomains");
let ips=lines("aIps");
let list=ips.join(";");
let out="";
domains.forEach(d=>{
out+=`${d},${d},TXT,Arecords:${list}\n`;
});
setOutput(out);
}

function copyOutput(){
let out=document.getElementById("output");
out.select();
document.execCommand("copy");
showToast();
}

function clearAll(){
document.querySelectorAll("textarea").forEach(t=>t.value="");
}

function showToast(){
let t=document.getElementById("toast");
t.style.display="block";
setTimeout(()=>t.style.display="none",2000);
}

function toggleTheme(){
document.body.classList.toggle("dark");

let btn=document.querySelector(".toggle");

if(document.body.classList.contains("dark")){
btn.innerHTML="☀️ Light Mode";
localStorage.theme="dark";
}else{
btn.innerHTML="🌙 Dark Mode";
localStorage.theme="light";
}
}

if(localStorage.theme==="dark"){
document.body.classList.add("dark");
document.querySelector(".toggle").innerHTML="☀️ Light Mode";
}

</script>

</body>
</html>
