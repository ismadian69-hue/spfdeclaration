<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>DNS Requests</title>

<style>
body{
    margin:0;
    padding:20px;
    font-family:Arial,Helvetica,sans-serif;
    background:#efefef;
}
h1{
    text-align:center;
    margin-bottom:30px;
}
.container{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
    gap:25px;
}
.box{
    background:#fff;
    border-radius:10px;
    padding:20px;
    box-shadow:0 0 10px rgba(0,0,0,.08);
}
.box h2{
    text-align:center;
    margin-top:0;
}
label{
    display:block;
    font-weight:bold;
    margin-top:15px;
    margin-bottom:6px;
}
textarea{
    width:100%;
    min-height:90px;
    resize:vertical;
    padding:10px;
    border:1px solid #ccc;
    border-radius:5px;
    box-sizing:border-box;
}
button{
    margin-top:15px;
    padding:10px 18px;
    border:none;
    border-radius:5px;
    color:#fff;
    cursor:pointer;
    font-size:15px;
}
.green{
    background:#28a745;
}
.green:hover{
    background:#218838;
}
.blue{
    background:#007bff;
}
.blue:hover{
    background:#0069d9;
}
#output{
    width:100%;
    height:160px;
    margin-top:25px;
}
</style>
</head>

<body>

<h1>DNS Requests</h1>

<div class="container">

<!-- SPF -->
<div class="box">
<h2>SPF Records</h2>

<label>SPF Domains (each on a new line):</label>
<textarea id="spfDomains"></textarea>

<label>SPF Subdomains (each on a new line):</label>
<textarea id="spfSubs"></textarea>

<label>SPF IPs (each on a new line):</label>
<textarea id="spfIps"></textarea>

<button class="green" onclick="generateSPF()">Generate SPF</button>
</div>

<!-- MX -->
<div class="box">
<h2>MX Records</h2>

<label>MX Domains (each on a new line):</label>
<textarea id="mxDomains"></textarea>

<label>MX Subdomains (each on a new line):</label>
<textarea id="mxSubs"></textarea>

<label>MX IPs (each on a new line):</label>
<textarea id="mxIps"></textarea>

<button class="green" onclick="generateMX()">Generate MX</button>
</div>

<!-- A -->
<div class="box">
<h2>A Records</h2>

<label>Domains (each on a new line):</label>
<textarea id="aDomains"></textarea>

<label>Subdomains (each on a new line):</label>
<textarea id="aSubs"></textarea>

<label>A Records IPs (each on a new line):</label>
<textarea id="aIps"></textarea>

<button class="green" onclick="generateA()">Generate A Records</button>
</div>

</div>

<textarea id="output" readonly placeholder="Generated records..."></textarea>
<br>
<button class="blue" onclick="copyOutput()">Copy Output</button>

<script>

function lines(id){
    return document.getElementById(id).value
    .split('\n')
    .map(v => v.trim())
    .filter(v => v !== "");
}

function setOutput(text){
    document.getElementById("output").value = text.trim();
}

/* SPF */
function generateSPF(){

    let domains = lines("spfDomains");
    let ips = lines("spfIps");

    let ipString = ips.map(ip => "ip4:"+ip).join(" ");

    let out = "";

    domains.forEach(domain=>{
        out += `${domain},${domain},TXT,"v=spf1 ${ipString} -all"\n`;
    });

    setOutput(out);
}

/* MX TXT STYLE */
function generateMX(){

    let domains = lines("mxDomains");
    let ips = lines("mxIps");

    let ipList = ips.join(";");

    let out = "";

    domains.forEach(domain=>{
        out += `${domain},${domain},TXT,MXrecords:${ipList}\n`;
    });

    setOutput(out);
}

/* A TXT STYLE */
function generateA(){

    let domains = lines("aDomains");
    let ips = lines("aIps");

    let ipList = ips.join(";");

    let out = "";

    domains.forEach(domain=>{
        out += `${domain},${domain},TXT,Arecords:${ipList}\n`;
    });

    setOutput(out);
}

/* COPY */
function copyOutput(){

    let output = document.getElementById("output");

    output.select();
    document.execCommand("copy");

    alert("Copied!");
}

</script>

</body>
</html>
