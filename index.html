<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DNS Hacker Dashboard</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Consolas, monospace;
}

body{
background:#000;
color:#00ff88;
overflow-x:hidden;
position:relative;
}

canvas{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-1;
}

.container{
padding:30px;
max-width:1400px;
margin:auto;
}

h1{
text-align:center;
font-size:40px;
margin-bottom:30px;
text-shadow:0 0 15px #00ff88;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
gap:20px;
}

.card{
background:rgba(0,0,0,.75);
border:1px solid #00ff88;
padding:20px;
border-radius:12px;
box-shadow:0 0 15px #00ff8840;
}

.card h2{
margin-bottom:15px;
text-align:center;
}

label{
display:block;
margin-top:12px;
margin-bottom:6px;
font-size:14px;
}

textarea{
width:100%;
height:95px;
background:#050505;
border:1px solid #00ff88;
color:#00ff88;
padding:10px;
border-radius:8px;
resize:vertical;
outline:none;
}

textarea:focus{
box-shadow:0 0 10px #00ff88;
}

button{
margin-top:15px;
padding:10px 18px;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;
transition:.3s;
}

.green{
background:#00ff88;
color:#000;
}

.green:hover{
box-shadow:0 0 15px #00ff88;
transform:translateY(-2px);
}

.red{
background:#ff0033;
color:#fff;
}

.red:hover{
box-shadow:0 0 15px #ff0033;
}

.output{
margin-top:30px;
}

#output{
height:220px;
background:#020202;
}

.actions{
display:flex;
gap:15px;
margin-top:15px;
flex-wrap:wrap;
}

.toast{
position:fixed;
top:20px;
right:20px;
background:#00ff88;
color:#000;
padding:12px 18px;
border-radius:8px;
font-weight:bold;
display:none;
z-index:999;
}

@media(max-width:768px){
h1{font-size:28px;}
}
</style>
</head>
<body>

<canvas id="matrix"></canvas>

<div class="toast" id="toast">Copied Successfully</div>

<div class="container">

<h1>DNS HACKER DASHBOARD</h1>

<div class="grid">

<div class="card">
<h2>SPF RECORDS</h2>

<label>Domains</label>
<textarea id="spfDomains"></textarea>

<label>IPs</label>
<textarea id="spfIps"></textarea>

<button class="green" onclick="generateSPF()">Generate SPF</button>
</div>

<div class="card">
<h2>MX RECORDS</h2>

<label>Domains</label>
<textarea id="mxDomains"></textarea>

<label>IPs</label>
<textarea id="mxIps"></textarea>

<button class="green" onclick="generateMX()">Generate MX</button>
</div>

<div class="card">
<h2>A RECORDS</h2>

<label>Domains</label>
<textarea id="aDomains"></textarea>

<label>IPs</label>
<textarea id="aIps"></textarea>

<button class="green" onclick="generateA()">Generate A</button>
</div>

</div>

<div class="card output">
<h2>OUTPUT CONSOLE</h2>

<textarea id="output" readonly></textarea>

<div class="actions">
<button class="green" onclick="copyOutput()">COPY</button>
<button class="red" onclick="clearAll()">CLEAR</button>
</div>

</div>

</div>

<script>

function lines(id){
return document.getElementById(id).value
.split('\n')
.map(x=>x.trim())
.filter(x=>x);
}

function setOutput(text){
document.getElementById("output").value=text.trim();
}

function generateSPF(){
let domains=lines("spfDomains");
let ips=lines("spfIps");
let iptxt=ips.map(ip=>"ip4:"+ip).join(" ");
let out="";
domains.forEach(d=>{
out+=`${d},${d},TXT,"v=spf1 ${iptxt} -all"\n`;
});
setOutput(out);
}

function generateMX(){
let domains=lines("mxDomains");
let ips=lines("mxIps");
let ipList=ips.join(";");
let out="";
domains.forEach(d=>{
out+=`${d},${d},TXT,MXrecords:${ipList}\n`;
});
setOutput(out);
}

function generateA(){
let domains=lines("aDomains");
let ips=lines("aIps");
let ipList=ips.join(";");
let out="";
domains.forEach(d=>{
out+=`${d},${d},TXT,Arecords:${ipList}\n`;
});
setOutput(out);
}

function copyOutput(){
let out=document.getElementById("output");
out.select();
document.execCommand("copy");
showToast();
}

function clearAll(){
document.querySelectorAll("textarea").forEach(t=>t.value="");
}

function showToast(){
let t=document.getElementById("toast");
t.style.display="block";
setTimeout(()=>t.style.display="none",2000);
}

/* MATRIX EFFECT */
const canvas=document.getElementById("matrix");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

const chars="01ABCDEFGHIJKLMNOPQRSTUVWXYZ";
const fontSize=14;
const columns=canvas.width/fontSize;
const drops=[];

for(let x=0;x<columns;x++) drops[x]=1;

function draw(){
ctx.fillStyle="rgba(0,0,0,0.05)";
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="#00ff88";
ctx.font=fontSize+"px monospace";

for(let i=0;i<drops.length;i++){
const text=chars[Math.floor(Math.random()*chars.length)];
ctx.fillText(text,i*fontSize,drops[i]*fontSize);

if(drops[i]*fontSize>canvas.height && Math.random()>0.975)
drops[i]=0;

drops[i]++;
}
}

setInterval(draw,35);

window.onresize=()=>{
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;
};

</script>

</body>
</html>
