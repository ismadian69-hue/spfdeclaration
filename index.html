<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>WMN3 DNS PRO</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:#0f172a;
color:#fff;
min-height:100vh;
}

/* TOPBAR */
.topbar{
background:linear-gradient(135deg,#2563eb,#1d4ed8);
padding:18px 30px;
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
gap:15px;
}

/* LOGO */
.brand{
display:flex;
align-items:center;
gap:14px;
}

.wmn3-logo{
display:grid;
grid-template-columns:repeat(2,28px);
grid-template-rows:repeat(2,28px);
gap:6px;
}

.wmn3-logo span{
width:28px;
height:28px;
display:flex;
align-items:center;
justify-content:center;
border-radius:9px;
font-size:14px;
font-weight:900;
color:#fff;
background:linear-gradient(135deg,#06b6d4,#2563eb);
}

.wmn3-logo span:nth-child(2){
background:linear-gradient(135deg,#8b5cf6,#2563eb);
}

.wmn3-logo span:nth-child(3){
background:linear-gradient(135deg,#10b981,#059669);
}

.wmn3-logo span:nth-child(4){
background:linear-gradient(135deg,#f59e0b,#ef4444);
}

.brand-text h1{
font-size:24px;
line-height:1;
}

.brand-text p{
font-size:12px;
margin-top:4px;
opacity:.9;
}

/* BUTTONS */
.top-actions{
display:flex;
gap:10px;
}

button{
border:none;
padding:10px 15px;
border-radius:10px;
font-weight:700;
cursor:pointer;
color:#fff;
}

.theme{
background:#0ea5e9;
}

.logout{
background:#ef4444;
}

/* CONTENT */
.wrapper{
padding:30px;
max-width:1400px;
margin:auto;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
gap:22px;
}

.card{
background:#111827;
padding:24px;
border-radius:20px;
border:1px solid #1f2937;
}

.card h2{
margin-bottom:18px;
}

label{
display:block;
margin-top:12px;
margin-bottom:6px;
color:#cbd5e1;
font-weight:700;
}

textarea{
width:100%;
height:90px;
padding:12px;
border-radius:12px;
border:1px solid #334155;
background:#020617;
color:#fff;
resize:vertical;
}

.action{
margin-top:16px;
width:100%;
background:#2563eb;
}

.output{
margin-top:25px;
background:#111827;
padding:24px;
border-radius:20px;
border:1px solid #1f2937;
}

#output{
height:220px;
}

.row{
display:flex;
gap:12px;
margin-top:14px;
}

.copy{
background:#10b981;
flex:1;
}

.clear{
background:#ef4444;
flex:1;
}

@media(max-width:768px){

.brand-text h1{
font-size:18px;
}

.brand-text p{
font-size:10px;
}

.wmn3-logo{
grid-template-columns:repeat(2,24px);
grid-template-rows:repeat(2,24px);
}

.wmn3-logo span{
width:24px;
height:24px;
font-size:12px;
}

.wrapper{
padding:18px;
}

}
</style>
</head>
<body>

<div class="topbar">

<div class="brand">

<div class="wmn3-logo">
<span>W</span>
<span>M</span>
<span>N</span>
<span>3</span>
</div>

<div class="brand-text">
<h1>WMN3 DNS PRO</h1>
<p>Premium Generator Tool</p>
</div>

</div>

<div class="top-actions">
<button class="theme">Theme</button>
<button class="logout">Logout</button>
</div>

</div>

<div class="wrapper">

<div class="grid">

<div class="card">
<h2>SPF Records</h2>

<label>Domains</label>
<textarea id="spfDomains"></textarea>

<label>Subdomains</label>
<textarea id="spfSubs"></textarea>

<label>IPs</label>
<textarea id="spfIps"></textarea>

<button class="action" onclick="generateSPF()">Generate SPF</button>
</div>

<div class="card">
<h2>MX Records</h2>

<label>Domains</label>
<textarea id="mxDomains"></textarea>

<label>Subdomains</label>
<textarea id="mxSubs"></textarea>

<label>IPs</label>
<textarea id="mxIps"></textarea>

<button class="action" onclick="generateMX()">Generate MX</button>
</div>

<div class="card">
<h2>A Records</h2>

<label>Domains</label>
<textarea id="aDomains"></textarea>

<label>Subdomains</label>
<textarea id="aSubs"></textarea>

<label>IPs</label>
<textarea id="aIps"></textarea>

<button class="action" onclick="generateA()">Generate A</button>
</div>

</div>

<div class="output">
<h2 style="margin-bottom:15px;">Output Console</h2>

<textarea id="output" readonly></textarea>

<div class="row">
<button class="copy" onclick="copyOutput()">Copy</button>
<button class="clear" onclick="clearAll()">Clear</button>
</div>

</div>

</div>

<script>
function lines(id){
return document.getElementById(id).value
.split('\n')
.map(x=>x.trim())
.filter(x=>x);
}

function generateSPF(){
let d=lines("spfDomains");
let s=lines("spfSubs");
let i=lines("spfIps");
let txt=i.map(ip=>"ip4:"+ip).join(" ");
let out="";

d.forEach(domain=>{
if(s.length){
s.forEach(sub=>{
out+=domain+","+sub+',TXT,"v=spf1 '+txt+' -all"\n';
});
}else{
out+=domain+","+domain+',TXT,"v=spf1 '+txt+' -all"\n';
}
});

output.value=out;
}

function generateMX(){
let d=lines("mxDomains");
let s=lines("mxSubs");
let i=lines("mxIps").join(";");
let out="";

d.forEach(domain=>{
if(s.length){
s.forEach(sub=>{
out+=domain+","+sub+",TXT,MXrecords:"+i+"\n";
});
}else{
out+=domain+","+domain+",TXT,MXrecords:"+i+"\n";
}
});

output.value=out;
}

function generateA(){
let d=lines("aDomains");
let s=lines("aSubs");
let i=lines("aIps").join(";");
let out="";

d.forEach(domain=>{
if(s.length){
s.forEach(sub=>{
out+=domain+","+sub+",TXT,Arecords:"+i+"\n";
});
}else{
out+=domain+","+domain+",TXT,Arecords:"+i+"\n";
}
});

output.value=out;
}

function copyOutput(){
output.select();
document.execCommand("copy");
}

function clearAll(){
document.querySelectorAll("textarea").forEach(t=>t.value="");
}
</script>

</body>
</html>
