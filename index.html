<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Secure DNS Dashboard</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter,Arial,sans-serif;
}

:root{
--bg:#0f172a;
--card:#111827;
--text:#ffffff;
--muted:#94a3b8;
--input:#020617;
--border:#1f2937;
}

body.light{
--bg:#f8fafc;
--card:#ffffff;
--text:#111827;
--muted:#64748b;
--input:#f8fafc;
--border:#e5e7eb;
}

body{
background:var(--bg);
color:var(--text);
min-height:100vh;
transition:.3s;
}

/* LOGIN */
.login-page{
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

.login-box{
width:100%;
max-width:430px;
background:var(--card);
padding:35px;
border-radius:22px;
border:1px solid var(--border);
box-shadow:0 20px 45px rgba(0,0,0,.35);
}

.login-box h1{
font-size:30px;
text-align:center;
margin-bottom:8px;
}

.login-box p{
text-align:center;
color:var(--muted);
margin-bottom:22px;
}

.login-box label{
display:block;
margin-top:14px;
margin-bottom:7px;
font-weight:700;
color:var(--muted);
}

.login-box input{
width:100%;
padding:13px;
border-radius:14px;
border:1px solid var(--border);
background:var(--input);
color:var(--text);
outline:none;
}

.login-btn{
width:100%;
margin-top:18px;
padding:13px;
border:none;
border-radius:14px;
background:linear-gradient(135deg,#2563eb,#1d4ed8);
color:#fff;
font-weight:800;
cursor:pointer;
}

.error{
margin-top:14px;
color:#ef4444;
text-align:center;
display:none;
}

/* DASHBOARD */
#dashboard{
display:none;
}

.topbar{
padding:22px 30px;
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
gap:15px;
background:linear-gradient(135deg,#2563eb,#4f46e5);
color:#fff;
}

.top-actions{
display:flex;
gap:10px;
flex-wrap:wrap;
}

.top-actions button{
padding:10px 16px;
border:none;
border-radius:12px;
font-weight:800;
cursor:pointer;
color:#fff;
}

.theme{background:#0ea5e9;}
.logout{background:#ef4444;}

.wrapper{
padding:28px;
max-width:1500px;
margin:auto;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(340px,1fr));
gap:22px;
}

.card{
background:var(--card);
border:1px solid var(--border);
border-radius:22px;
padding:24px;
}

.card h2{
margin-bottom:16px;
font-size:24px;
}

label{
display:block;
margin-top:14px;
margin-bottom:7px;
font-weight:700;
color:var(--muted);
}

textarea{
width:100%;
height:92px;
padding:12px;
border-radius:14px;
border:1px solid var(--border);
background:var(--input);
color:var(--text);
resize:vertical;
outline:none;
}

button.action{
width:100%;
margin-top:16px;
padding:12px;
border:none;
border-radius:14px;
font-weight:800;
cursor:pointer;
color:#fff;
background:linear-gradient(135deg,#2563eb,#1d4ed8);
}

.output,.history{
margin-top:25px;
background:var(--card);
border:1px solid var(--border);

padding:24px;

#output{

.row{
display:flex;
gap:14px;

.row button{

color:#fff;
}

.copy{background:#10b981;}

.history ul{
list-style:none;
margin-top:14px;

.history li{

.history li:hover{

}

.toast{

}

.wrapper{padding:18px;}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-page" id="loginPage">
<div class="login-box">
<h1>🔒 Secure Access</h1>
<p>Please login to continue</p>

<label>Username</label>
<input type="text" id="username">

<label>Password</label>
<input type="password" id="password">

<button class="login-btn" onclick="login()">Login</button>

<div class="error" id="error">Invalid Username or Password</div>
</div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">

<div class="topbar">
<h1>DNS Premium Dashboard</h1>

<div class="top-actions">
<button class="theme" onclick="toggleTheme()">🌙 Theme</button>
<button class="logout" onclick="logout()">Logout</button>
</div>
</div>

<div class="wrapper">

<div class="grid">

<div class="card">
<h2>SPF Records</h2>
<label>Domains</label>
<textarea id="spfDomains"></textarea>
<label>Subdomains</label>
<textarea id="spfSubs"></textarea>
<label>IPs</label>
<textarea id="spfIps"></textarea>
<button class="action" onclick="generateSPF()">Generate SPF</button>
</div>

<div class="card">
<h2>MX Records</h2>
<label>Domains</label>
<textarea id="mxDomains"></textarea>
<label>Subdomains</label>
<textarea id="mxSubs"></textarea>
<label>IPs</label>
<textarea id="mxIps"></textarea>
<button class="action" onclick="generateMX()">Generate MX</button>
</div>

<div class="card">
<h2>A Records</h2>
<label>Domains</label>
<textarea id="aDomains"></textarea>
<label>Subdomains</label>
<textarea id="aSubs"></textarea>
<label>IPs</label>
<textarea id="aIps"></textarea>
<button class="action" onclick="generateA()">Generate A</button>
</div>

</div>

<div class="output">
<h2 style="margin-bottom:14px;">Output Console</h2>
<textarea id="output" readonly></textarea>

<div class="row">
<button class="copy" onclick="copyOutput()">Copy Output</button>
<button class="clear" onclick="clearAll()">Clear All</button>
</div>
</div>

<div class="history">
<h2>History</h2>
<ul id="historyList"></ul>
</div>

</div>
</div>

<div class="toast" id="toast">Copied Successfully</div>

<script>

/* LOGIN DATA */
const USERNAME="admin";
const PASSWORD="123456";

/* FORCE LOGIN EVERY OPEN */
document.getElementById("dashboard").style.display="none";
document.getElementById("loginPage").style.display="flex";

/* LOGIN */
function login(){
let u=document.getElementById("username").value.trim();
let p=document.getElementById("password").value.trim();

if(u===USERNAME && p===PASSWORD){
document.getElementById("loginPage").style.display="none";
document.getElementById("dashboard").style.display="block";
renderHistory();
}else{
document.getElementById("error").style.display="block";
}
}

function logout(){
location.reload();
}

/* ENTER KEY */
document.addEventListener("keydown",function(e){
if(e.key==="Enter"){
login();
}
});

/* THEME */
if(localStorage.theme==="light"){
document.body.classList.add("light");
}

function toggleTheme(){
document.body.classList.toggle("light");
localStorage.theme=document.body.classList.contains("light") ? "light":"dark";
}

/* HELPERS */
function lines(id){
return document.getElementById(id).value
.split('\n')
.map(x=>x.trim())
.filter(x=>x);
}

function setOutput(text){
document.getElementById("output").value=text.trim();
saveHistory(text.trim());
}

function showToast(msg="Copied Successfully"){
let t=document.getElementById("toast");
t.innerText=msg;
t.style.display="block";
setTimeout(()=>t.style.display="none",1800);
}

/* HISTORY */
function saveHistory(result){
if(!result) return;

let history=JSON.parse(localStorage.getItem("dnsHistory")||"[]");

history.unshift({
date:new Date().toLocaleString(),
data:result
});

history=history.slice(0,20);

localStorage.setItem("dnsHistory",JSON.stringify(history));
renderHistory();
}

function renderHistory(){
let list=document.getElementById("historyList");
list.innerHTML="";

let history=JSON.parse(localStorage.getItem("dnsHistory")||"[]");

history.forEach(item=>{
let li=document.createElement("li");
li.innerHTML=item.date;
li.onclick=function(){
document.getElementById("output").value=item.data;
};
list.appendChild(li);
});
}

/* SPF */
function generateSPF(){
let domains=lines("spfDomains");
let subs=lines("spfSubs");
let ips=lines("spfIps");
let txt=ips.map(ip=>"ip4:"+ip).join(" ");
let out="";

domains.forEach(domain=>{
if(subs.length){
subs.forEach(sub=>{
out+=`${domain},${sub},TXT,"v=spf1 ${txt} -all"\n`;
});
}else{
out+=`${domain},${domain},TXT,"v=spf1 ${txt} -all"\n`;
}
});

setOutput(out);
}

/* MX */
function generateMX(){
let domains=lines("mxDomains");
let subs=lines("mxSubs");
let ips=lines("mxIps").join(";");
let out="";

domains.forEach(domain=>{
if(subs.length){
subs.forEach(sub=>{
out+=`${domain},${sub},TXT,MXrecords:${ips}\n`;
});
}else{
out+=`${domain},${domain},TXT,MXrecords:${ips}\n`;
}
});

setOutput(out);
}

/* A */
function generateA(){
let domains=lines("aDomains");
let subs=lines("aSubs");
let ips=lines("aIps").join(";");
let out="";

domains.forEach(domain=>{
if(subs.length){
subs.forEach(sub=>{
out+=`${domain},${sub},TXT,Arecords:${ips}\n`;
});
}else{
out+=`${domain},${domain},TXT,Arecords:${ips}\n`;
}
});

setOutput(out);
}

/* COPY */
function copyOutput(){
let out=document.getElementById("output");
out.select();
document.execCommand("copy");
showToast();
}

/* CLEAR */
function clearAll(){
document.querySelectorAll("textarea").forEach(t=>t.value="");
}

</script>

</body>
</html>
